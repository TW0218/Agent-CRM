<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent CRM — Sports Solution</title>
<meta name="theme-color" content="#0D1F3C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Agent CRM">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="apple-touch-icon-precomposed" href="/apple-touch-icon-precomposed.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1F3C;--green:#00C46A;--green-dim:#00A857;--bg:#ffffff;--bg2:#f8f7f4;--bg3:#f0ede8;--txt:#1a1916;--txt2:#6b6966;--txt3:#a8a5a0;--border:#e8e5e0;--border2:#d4d0ca;--r:6px;--rl:10px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1916;--bg2:#222120;--bg3:#2a2826;--txt:#f0ede8;--txt2:#a8a5a0;--txt3:#6b6966;--border:#2e2c2a;--border2:#3a3836}}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;color:var(--txt);background:var(--bg2);height:100vh;overflow:hidden}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;overflow-y:auto}
.logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.1)}
.logo-name{font-size:15px;font-weight:600;color:#fff;letter-spacing:.5px}
.logo-tag{font-size:10px;color:var(--green);margin-top:2px}
.nav-section{font-size:10px;color:rgba(255,255,255,0.3);padding:12px 16px 4px;letter-spacing:.8px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:rgba(255,255,255,0.6);font-size:13px;transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{color:#fff;background:rgba(255,255,255,0.06)}
.nav-item.active{color:#fff;background:rgba(0,196,106,0.15);border-left-color:var(--green)}
.nav-item i{font-size:15px;flex-shrink:0}
.nbadge{margin-left:auto;background:var(--green);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center}
.nbadge.red{background:#E24B4A}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);flex-shrink:0}
.topbar h1{font-size:15px;font-weight:600;flex:1}
.search-wrap{position:relative}
.search-wrap input{padding:6px 10px 6px 28px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;background:var(--bg2);color:var(--txt);width:180px;outline:none}
.search-wrap input:focus{border-color:var(--green)}
.search-wrap i{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:13px}
.content{flex:1;overflow-y:auto;padding:18px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;cursor:pointer;background:var(--bg);color:var(--txt);transition:all .15s;font-family:inherit}
.btn:hover{background:var(--bg2)}
.btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn.primary:hover{background:var(--green-dim)}
.btn.danger{color:#E24B4A;border-color:rgba(226,75,74,0.2)}
.btn.danger:hover{background:#FCEBEB}
.btn.sm{padding:3px 8px;font-size:11px}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:var(--bg2)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{font-size:11px;padding:2px 7px;border-radius:8px;font-weight:500}
.tag.pos{background:#E6F1FB;color:#185FA5}
.tag.green{background:#EAF3DE;color:#3B6D11}
.tag.orange{background:#FAEEDA;color:#854F0B}
.tag.red{background:#FCEBEB;color:#A32D2D}
.tag.gray{background:#F1EFE8;color:#5F5E5A}
.tag.navy{background:rgba(13,31,60,0.1);color:var(--navy)}
.tag.teal{background:#E1F5EE;color:#0F6E56}
.stars{display:flex;gap:1px}
.star{font-size:12px;color:#D3D1C7}
.star.on{color:#EF9F27}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--bg2);border-radius:var(--r);padding:14px 16px;border:1px solid var(--border)}
.kpi-label{font-size:11px;color:var(--txt2);margin-bottom:4px}
.kpi-value{font-size:24px;font-weight:600}
.kpi-value.orange{color:#BA7517}
.kpi-value.red{color:#E24B4A}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-weight:500;font-size:11px;color:var(--txt2);border-bottom:1px solid var(--border);background:var(--bg2)}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--bg2)}
tr:last-child td{border-bottom:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-start;justify-content:center;padding-top:40px;z-index:200}
.modal{background:var(--bg);border-radius:var(--rl);padding:22px;width:680px;max-width:96vw;max-height:80vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:18px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:var(--txt2);margin-bottom:4px;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;background:var(--bg);color:var(--txt);font-family:inherit;outline:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--green)}
.form-row textarea{min-height:60px;resize:vertical}
.form-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.empty{text-align:center;padding:48px 20px;color:var(--txt3)}
.empty i{font-size:32px;display:block;margin-bottom:12px}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sh span{font-size:13px;font-weight:600}
.score-bar{height:3px;background:var(--border);border-radius:2px;margin-top:3px}
.score-fill{height:100%;border-radius:2px;background:var(--green)}
.ri{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.ri:last-child{border-bottom:none}
.adot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab-btn{padding:8px 14px;font-size:12px;cursor:pointer;color:var(--txt2);border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab-btn.active{color:var(--green-dim);border-bottom-color:var(--green)}
.pitch{background:#2a6e2a;border-radius:8px;width:100%;height:320px;position:relative;overflow:hidden;user-select:none}
.pitch-line{position:absolute;border:1px solid rgba(255,255,255,0.2)}
.pdot{position:absolute;transform:translate(-50%,-50%);text-align:center}
.pdot .dc{width:28px;height:28px;border-radius:50%;background:#fff;border:2px solid rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#0D1F3C;margin:0 auto}
.pdot .dc.away{background:#E24B4A;color:#fff}
.pdot .pn{font-size:8px;color:#fff;margin-top:1px;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.9);max-width:54px;overflow:hidden;text-overflow:ellipsis}
.eval-row{display:grid;grid-template-columns:28px 20px 1fr 36px 36px;gap:5px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.eval-row:last-child{border-bottom:none}
.match-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;cursor:pointer;transition:border-color .15s}
.match-card:hover{border-color:var(--border2)}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--rl);padding:20px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:14px;background:var(--bg2)}
.upload-zone:hover{border-color:var(--green);background:rgba(0,196,106,0.04)}
.ai-loading{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(0,196,106,0.08);border-radius:var(--r);margin-bottom:12px;font-size:12px;color:var(--green-dim);border:1px solid rgba(0,196,106,0.2)}
.spinner{width:16px;height:16px;border:2px solid rgba(0,196,106,0.3);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-success{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(0,196,106,0.08);border-radius:var(--r);margin-bottom:12px;font-size:12px;color:var(--green-dim);border:1px solid rgba(0,196,106,0.2)}
.ai-error{padding:10px 14px;background:#FCEBEB;border-radius:var(--r);margin-bottom:12px;font-size:12px;color:#A32D2D;border:1px solid rgba(226,75,74,0.2)}
.section-label{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.6px;padding:8px 2px 3px;border-bottom:1px solid var(--border);margin-bottom:2px;text-transform:uppercase}
.pitem{display:grid;grid-template-columns:22px 20px 1fr 14px;align-items:center;gap:5px;padding:5px 2px;border-bottom:1px solid var(--border);font-size:11px;cursor:pointer}
.pitem:last-child{border-bottom:none}
.pitem:hover{background:var(--bg2)}
.pitem.bench{opacity:0.7}
.pnum{font-size:11px;font-weight:600;text-align:center}
.pdot-s{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;flex-shrink:0}
.pdot-s.bench{border:1.5px dashed currentColor;background:transparent!important}
/* iPad (768px〜1024px) */
@media(min-width:769px)and(max-width:1024px){
  .sidebar{width:160px}
  .nav-item{font-size:12px;padding:8px 12px}
  .logo-name{font-size:13px}
  .content{padding:14px}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .modal{width:90vw;max-width:640px;padding:18px 20px}
  .pitch{height:260px}
  table{font-size:12px}
  th,td{padding:7px 8px}
  .topbar{padding:10px 14px}
  .search-wrap input{width:150px}
}
/* iPhone / Android (〜768px) */
@media(max-width:768px){
  body{overflow:auto}
  .app{flex-direction:column;height:auto;min-height:100vh}
  .sidebar{display:none}
  .main{flex:1;padding-bottom:64px}
  .topbar{padding:10px 14px;gap:8px}
  .topbar h1{font-size:14px}
  .search-wrap input{width:130px;font-size:12px}
  .content{padding:12px;overflow-y:visible}
  .cards-grid{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
  .kpi{padding:10px 12px}
  .kpi-value{font-size:20px}
  .modal-overlay{padding-top:0;align-items:flex-end}
  .modal{width:100%;max-width:100%;max-height:90vh;border-radius:var(--rl) var(--rl) 0 0;padding:18px 16px}
  .form-cols{grid-template-columns:1fr}
  table{font-size:12px}
  th,td{padding:7px 8px}
  .eval-row{grid-template-columns:24px 18px 1fr 34px 34px;font-size:11px}
  .mobile-nav{display:flex!important}
}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:1px solid rgba(255,255,255,0.1);z-index:100;height:84px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;scrollbar-width:none}
.mobile-nav::-webkit-scrollbar{display:none}
.mobile-nav-item{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 18px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:10px;gap:4px;border-top:2px solid transparent;min-width:74px;scroll-snap-align:start}
.mobile-nav-item i{font-size:24px}
.mobile-nav-item.active{color:var(--green);border-top-color:var(--green)}
</style>
</head>
<body>
<div class="app" id="app" style="position:relative">
  <div class="sidebar">
    <div class="logo"><div class="logo-name">Agent CRM</div><div class="logo-tag">Sports Solution</div></div>

      <div class="search-wrap" style="position:relative"><i class="ti ti-search"></i><input id="search-input" placeholder="検索..." oninput="handleSearch(this.value)" autocomplete="off" onblur="setTimeout(()=>hideSuggest(),150)"><div id="suggest-box" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,0.15);z-index:500;max-height:220px;overflow-y:auto;margin-top:2px"></div></div>
      <button class="btn primary" id="add-btn" onclick="openAddModal()" style="display:none"><i class="ti ti-plus"></i><span id="add-label">追加</span></button>

</div>
<script>
// Password protection
(function(){
  const KEY='ssg_auth';
  if(localStorage.getItem(KEY)==='1')return;
  document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('app').style.display='none';
    const overlay=document.createElement('div');
    overlay.id='auth-overlay';
    overlay.style.cssText='position:fixed;inset:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;z-index:9999';
    overlay.innerHTML=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:36px 32px;width:320px;max-width:90vw;text-align:center">
      <div style="font-size:18px;font-weight:700;margin-bottom:6px">Agent CRM</div>
      <div style="font-size:12px;color:var(--txt2);margin-bottom:24px">Sports Solution</div>
      <input id="pw-input" type="password" placeholder="パスワードを入力" style="width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:6px;font-size:14px;background:var(--bg2);color:var(--txt);outline:none;margin-bottom:12px;box-sizing:border-box">
      <div id="pw-error" style="color:#E24B4A;font-size:12px;margin-bottom:8px;display:none">パスワードが違います</div>
      <button onclick="checkPw()" style="width:100%;padding:10px;background:#00C46A;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer">ログイン</button>
    </div>`;
    document.body.appendChild(overlay);
    document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
  });
  window.checkPw=function(){
    const v=document.getElementById('pw-input').value;
    if(v==='ssg2014'){
      localStorage.setItem(KEY,'1');
      document.getElementById('auth-overlay').remove();
      document.getElementById('app').style.display='';
    }else{
      document.getElementById('pw-error').style.display='block';
      document.getElementById('pw-input').value='';
      document.getElementById('pw-input').focus();
    }
  };
})();
const TABS=[
  {id:'dashboard',label:'Dashboard',icon:'ti-home',sec:''},
  {id:'matchreports',label:'試合レポート',icon:'ti-ball-football',sec:'視察'},
  {id:'scouting',label:'選手レポート',icon:'ti-user-search',sec:''},
  {id:'players',label:'弊社契約',icon:'ti-users',sec:'管理'},
  {id:'contracts',label:'チーム契約',icon:'ti-file-text',sec:''},
  {id:'clubs',label:'クラブ',icon:'ti-building',sec:''},
  {id:'reminders',label:'リマインダー',icon:'ti-bell',sec:'その他'},
  {id:'schedule',label:'スタッフ予定',icon:'ti-calendar-event',sec:''},
];
const POSITIONS=['GK','DF','CB','SB','WB','DMF','CMF','AMF','SMF','WG','SS','CF'];
const FORMATIONS=['4-4-2','4-3-3','4-2-3-1','3-5-2','3-4-3','5-3-2','4-1-4-1'];
const FCOORDS_HOME={
  '4-4-2':[[5,50],[22,20],[22,40],[22,60],[22,80],[38,15],[38,38],[38,62],[38,85],[48,35],[48,65]],
  '4-3-3':[[5,50],[22,20],[22,40],[22,60],[22,80],[36,30],[36,50],[36,70],[48,15],[48,50],[48,85]],
  '4-2-3-1':[[5,50],[22,20],[22,40],[22,60],[22,80],[33,35],[33,65],[42,15],[42,50],[42,85],[48,50]],
  '3-5-2':[[5,50],[22,25],[22,50],[22,75],[33,12],[36,32],[36,50],[36,68],[33,88],[48,35],[48,65]],
  '3-4-3':[[5,50],[22,25],[22,50],[22,75],[34,15],[34,40],[34,60],[34,85],[48,20],[48,50],[48,80]],
  '5-3-2':[[5,50],[20,10],[20,30],[22,50],[20,70],[20,90],[35,30],[35,50],[35,70],[48,35],[48,65]],
  '4-1-4-1':[[5,50],[22,20],[22,40],[22,60],[22,80],[30,50],[40,15],[40,38],[40,62],[40,85],[48,50]],
};
const FCOORDS_AWAY={};
Object.keys(FCOORDS_HOME).forEach(k=>{FCOORDS_AWAY[k]=FCOORDS_HOME[k].map(([x,y])=>[100-x,y]);});

const SURL='https://ahlnaawthjkdjbizspec.supabase.co';
const SKEY='sb_publishable_b04LWH253h7yFLTRRefqCQ_VozK30io';
const _cache={};
const DB={
  get(k){return _cache[k]||[]},
  getObj(k){const v=_cache[k];return(v&&!Array.isArray(v))?v:{}},
  set(k,v){
    _cache[k]=v;
    fetch(SURL+'/rest/v1/crm_data?on_conflict=key',{method:'POST',headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({key:k,value:v})}).catch(e=>console.error('DB.set error',e.message));
  },
  async load(){
    try{
      const r=await fetch(SURL+'/rest/v1/crm_data?select=key,value&key=not.like.contract_pdf_%25',{headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}});
      const rows=await r.json();
      if(Array.isArray(rows))rows.forEach(row=>{_cache[row.key]=row.value||[];});
    }catch(e){console.error('DB.load error',e);}
  },
  async fetchOne(k){
    const r=await fetch(SURL+'/rest/v1/crm_data?key=eq.'+encodeURIComponent(k)+'&select=value',{headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}});
    const rows=await r.json();
    return(Array.isArray(rows)&&rows[0])?rows[0].value:null;
  },
  id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
};
let S={tab:'dashboard',search:'',filter:{}};
function days(d){if(!d)return null;return Math.round((new Date(d)-new Date())/86400000)}
function fmt(d){if(!d)return'—';return new Date(d).toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'})}
function stars(n){return Array.from({length:5},(_,i)=>`<span class="star ${i<n?'on':''}">★</span>`).join('')}
function scol(s){return{Prospect:'gray',Negotiating:'pos',Agreed:'green',Completed:'navy',Dead:'red'}[s]||'gray'}
function ccol(d){const n=days(d);if(n===null)return'gray';if(n<0)return'red';if(n<=90)return'orange';return'green'}
function rcol(r){return{Sign:'green',Monitor:'orange',Pass:'red'}[r]||'gray'}
function abg(s,i=0){const c=[['#E6F1FB','#185FA5'],['#EAF3DE','#3B6D11'],['#FAEEDA','#854F0B'],['#FBEAF0','#993556'],['#E1F5EE','#0F6E56']];const idx=(s.charCodeAt(0)+i)%c.length;return c[idx]}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}
function lastName(n){return(n||'').split(/[\s　]/)[0]}

function renderNav(){
  const rem=DB.get('reminders').filter(r=>!r.done&&new Date(r.dueDate)<=new Date(Date.now()+604800000));
  const pl=DB.get('players');
  const dl=DB.get('deals').filter(d=>d.status!=='Completed'&&d.status!=='Dead');
  const cnt={players:pl.length,deals:dl.length,reminders:rem.length};
  let html='',lastSec='';
  TABS.forEach(t=>{

  });

  document.getElementById('mobile-nav').innerHTML=TABS.map(t=>`<div class="mobile-nav-item ${S.tab===t.id?'active':''}" onclick="setTab('${t.id}')"><i class="ti ${t.icon}"></i>${t.label}</div>`).join('');

function hideSuggest(){const b=document.getElementById('suggest-box');if(b)b.style.display='none';}
function handleSearch(v){
  S.search=v.toLowerCase();
  renderContent();
  if(!v){hideSuggest();return;}
  const q=v.toLowerCase().replace(/\s+/g,'');
  const norm=s=>(s||'').toLowerCase().replace(/\s+/g,'');
  const results=[];
  // 弊社契約
  DB.get('players').forEach(p=>{if(norm(p.name).includes(q)||norm(p.currentClub).includes(q))results.push({tab:'players',icon:'ti-users',label:esc(p.name),sub:esc(p.currentClub||''),id:p.id});});
  // 選手レポート
  DB.get('scouting').forEach(r=>{if(norm(r.playerName).includes(q)||norm(r.teamName).includes(q))results.push({tab:'scouting',icon:'ti-user-search',label:esc(r.playerName),sub:esc(r.teamName||''),id:r.id});});
  // 試合レポート（チーム名・選手名）
  DB.get('matchreports').forEach(r=>{
    const inTeam=norm(r.homeTeam).includes(q)||norm(r.awayTeam).includes(q);
    const matchedP=[...(r.homePlayers||[]),...(r.awayPlayers||[])].filter(p=>norm(p.name).includes(q));
    if(inTeam)results.push({tab:'matchreports',icon:'ti-ball-football',label:esc(r.homeTeam)+' vs '+esc(r.awayTeam),sub:fmt(r.date),id:r.id,action:'view'});
    matchedP.forEach(p=>{if(!results.find(x=>x.id===r.id&&x.tab==='matchreports'))results.push({tab:'matchreports',icon:'ti-ball-football',label:esc(r.homeTeam)+' vs '+esc(r.awayTeam),sub:`${esc(p.name)} 出場`,id:r.id,action:'view'});});
  });
  // クラブ
  DB.get('clubs').forEach(c=>{if(norm(c.name).includes(q))results.push({tab:'clubs',icon:'ti-building',label:esc(c.name),sub:esc(c.league||''),id:c.id});});
  // チーム契約
  DB.get('contracts').forEach(c=>{if(norm(c.playerName).includes(q)||norm(c.clubName).includes(q))results.push({tab:'contracts',icon:'ti-file-text',label:esc(c.playerName),sub:esc(c.clubName||''),id:c.id});});
  const tabLabel={players:'弊社契約',scouting:'選手レポート',matchreports:'試合レポート',clubs:'クラブ',contracts:'チーム契約'};
  const box=document.getElementById('suggest-box');
  if(!box)return;
  if(results.length===0){box.style.display='none';return;}
  box.innerHTML=results.slice(0,15).map(r=>`<div onclick="goToResult('${r.tab}','${r.id}','${r.action||''}')" style="padding:7px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px" onmouseenter="this.style.background='var(--bg2)'" onmouseleave="this.style.background=''">
    <i class="ti ${r.icon}" style="font-size:13px;color:var(--txt3);flex-shrink:0"></i>
    <div style="flex:1;min-width:0"><div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.label}</div><div style="font-size:10px;color:var(--txt3)">${r.sub}</div></div>
    <span style="font-size:10px;color:var(--txt3);flex-shrink:0">${tabLabel[r.tab]||''}</span>
  </div>`).join('');
  box.style.display='block';
}
function goToResult(tab,id,action){

function viewMatchReport(id){
  const r=DB.get('matchreports').find(x=>x.id===id);
  if(!r)return;
  const allHome=r.homePlayers||[];
  const allAway=r.awayPlayers||[];
  const hp=allHome.filter(p=>!p.bench);
  const ap=allAway.filter(p=>!p.bench);
  const ev=r.playerEvals||[];
  const gev=(name,team)=>ev.find(e=>e.name===name&&e.team===team)||{};
  const norm=s=>(s||'').replace(/\s+/g,'').toLowerCase();
  const scoutingAll=DB.get('scouting');
  const getScouting=name=>scoutingAll.find(s=>norm(s.playerName)===norm(name));
  const scoutTagCol={有力選手:'green',継続監視:'orange',契約打診:'teal',獲得推奨:'green',見送り:'red'};
  const scoutInfo=p=>{
    const s=getScouting(p.name);
    if(!s)return'';
    const col=scoutTagCol[s.scoutStatus]||'gray';
    return`<div style="margin-top:5px;padding:6px 8px;background:var(--bg2);border-radius:5px;border-left:3px solid var(--green)">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span class="tag ${col}" style="font-size:10px">${esc(s.scoutStatus||'—')}</span>
        <span style="font-size:10px;color:var(--txt3)">選手レポートあり</span>
      </div>
      ${s.strengths?`<div style="font-size:10px;color:var(--txt2)"><span style="color:var(--green);font-weight:600">強み</span> ${esc(s.strengths)}</div>`:''}
      ${s.weaknesses?`<div style="font-size:10px;color:var(--txt2)"><span style="color:#E24B4A;font-weight:600">課題</span> ${esc(s.weaknesses)}</div>`:''}
      ${s.notes?`<div style="font-size:10px;color:var(--txt3);margin-top:2px">${esc(s.notes)}</div>`:''}

function startDragDot(e,el){
  e.preventDefault();e.stopPropagation();
  const pitch=document.getElementById('pitch-view');
  if(!pitch)return;
  el.style.cursor='grabbing';el.style.zIndex=20;
  const isTouchEvent=!!e.touches;
  const startX=isTouchEvent?e.touches[0].clientX:e.clientX;
  const startY=isTouchEvent?e.touches[0].clientY:e.clientY;
  const startLeft=parseFloat(el.style.left);
  const startTop=parseFloat(el.style.top);
  function onMove(me){
    const cx=me.touches?me.touches[0].clientX:me.clientX;
    const cy=me.touches?me.touches[0].clientY:me.clientY;
    const rect=pitch.getBoundingClientRect();
    let nx=startLeft+(cx-startX)/rect.width*100;
    let ny=startTop+(cy-startY)/rect.height*100;
    nx=Math.max(2,Math.min(98,nx));ny=Math.max(2,Math.min(98,ny));
    el.style.left=nx+'%';el.style.top=ny+'%';
  }
  function onUp(){
    el.style.cursor='grab';el.style.zIndex=10;
    document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);
    document.removeEventListener('touchmove',onMove);document.removeEventListener('touchend',onUp);
  }
  document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  document.addEventListener('touchmove',onMove,{passive:false});document.addEventListener('touchend',onUp);
}
function detectFormation(players, isAway){
  if(!players||players.length<2)return null;
  // depth: distance from own goal (0=own goal side, 100=opponent goal side)
  const withD=players.map((p,i)=>({...p,_i:i,_d:isAway?(100-(p.pitchX||50)):(p.pitchX||50)}));
  withD.sort((a,b)=>a._d-b._d);

  // GK = shallowest (closest to own goal)
  const gk=withD[0];
  gk.position='GK';
  const out=withD.slice(1);

  // Zone boundaries matching visual guides
  // GK:4-10, DF:10-28, MF:28-40, FW:40+
  const wide=y=>y<25||y>75; // touchline side

  const dfPlayers=out.filter(p=>p._d<24);
  const mfPlayers=out.filter(p=>p._d>=24&&p._d<37);
  const fwPlayers=out.filter(p=>p._d>=37);
  const dfCount=dfPlayers.length;

  // DF zone: SB (wide) / CB (center)
  dfPlayers.forEach(p=>{p.position=wide(p.pitchY)?'SB':'CB';});

  // MF zone
  mfPlayers.forEach(p=>{
    const rel=(p._d-24)/13; // 0=DF boundary, 1=FW boundary
    if(wide(p.pitchY)){
      // WB in 3-back system, SMF otherwise
      p.position=dfCount===3?'WB':'SMF';
    } else {
      if(rel<0.35)p.position='DMF';
      else if(rel>0.65)p.position='AMF';
      else p.position='CMF';
    }
  });

  // FW zone: SS (near MF boundary), CF (near halfway line), WG (wide)
  fwPlayers.forEach(p=>{
    if(wide(p.pitchY))p.position='WG';
    else p.position=p._d<45?'SS':'CF';
  });

  // Formation string: use zone boundaries directly
  const fLines=[dfCount,mfPlayers.length,fwPlayers.length].filter(n=>n>0);
  const formation=fLines.join('-');
  console.log('[detectFormation]',isAway?'AWAY':'HOME','depths:',withD.map(p=>p._d.toFixed(1)),'df:'+dfCount,'mf:'+mfPlayers.length,'fw:'+fwPlayers.length,'→',formation);

  const posMap={};
  [gk,...out].forEach(p=>{posMap[p._i]=p.position;});
  return{formation,posMap};
}
function savePitchPositions(id){
  const pitch=document.getElementById('pitch-view');
  if(!pitch)return;
  const dots=Array.from(pitch.querySelectorAll('.pdot'));
  const recs=DB.get('matchreports');
  const idx=recs.findIndex(r=>r.id===id);
  if(idx<0)return;
  const r=recs[idx];
  const hp=(r.homePlayers||[]).filter(p=>!p.bench);
  const ap=(r.awayPlayers||[]).filter(p=>!p.bench);
  let hi=0,ai=0;
  dots.forEach(dot=>{
    const x=parseFloat(dot.style.left);
    const y=parseFloat(dot.style.top);
    const isAway=!!dot.querySelector('.dc.away');
    if(isAway){if(ap[ai]){ap[ai].pitchX=x;ap[ai].pitchY=y;}ai++;}
    else{if(hp[hi]){hp[hi].pitchX=x;hp[hi].pitchY=y;}hi++;}
  });
  // detect formation & auto-assign positions
  const hRes=detectFormation(hp,false);
  const aRes=detectFormation(ap,true);
  if(hRes){hp.forEach((p,i)=>{if(hRes.posMap[i])p.position=hRes.posMap[i];});recs[idx].homeFormation=hRes.formation;}
  if(aRes){ap.forEach((p,i)=>{if(aRes.posMap[i])p.position=aRes.posMap[i];});recs[idx].awayFormation=aRes.formation;}
  let hsi=0,asi=0;
  recs[idx].homePlayers=(r.homePlayers||[]).map(p=>p.bench?p:(hp[hsi++]||p));
  recs[idx].awayPlayers=(r.awayPlayers||[]).map(p=>p.bench?p:(ap[asi++]||p));
  DB.set('matchreports',recs);
  const btn=document.getElementById('save-pitch-btn');
  const hf=hRes?hRes.formation:'';
  const af=aRes?aRes.formation:'';
  if(btn){btn.innerHTML=`<i class="ti ti-check"></i> 保存完了${hf?' ('+hf+' vs '+af+')':''}`;setTimeout(()=>{btn.innerHTML='<i class="ti ti-device-floppy"></i> 配置保存';viewMatchReport(id);},1800);}
}

function buildPlayerKnowledge(){
  const map={};
  DB.get('matchreports').forEach(r=>{
    [...(r.homePlayers||[]),...(r.awayPlayers||[])].forEach(p=>{
      if(!p.name)return;
      const key=p.name.trim();
      if(!map[key])map[key]={name:key};
      const cur=map[key];
      if(p.height&&!cur.height)cur.height=p.height;
      if(p.weight&&!cur.weight)cur.weight=p.weight;
      if(p.club&&!cur.club)cur.club=p.club;
      if(p.position&&!cur.position)cur.position=p.position;
      if(p.foot&&!cur.foot)cur.foot=p.foot;
      if(p.age&&!cur.age)cur.age=p.age;
      if(p.num&&!cur.num)cur.num=p.num;
    });
  });
  return Object.values(map);
}
async function analyzeMatchSheet(file){
  const statusEl=document.getElementById('ocr-status');
  statusEl.innerHTML=`<div class="ai-loading"><div class="spinner"></div>AIがメンバー表を解析中（claude-opus）...</div>`;
  try{
    const base64=await new Promise((res,rej)=>{const reader=new FileReader();reader.onload=e=>res(e.target.result.split(',')[1]);reader.onerror=rej;reader.readAsDataURL(file);});
    const playerKnowledge=buildPlayerKnowledge();
    const resp=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:base64,mediaType:file.type||'image/jpeg',playerKnowledge})});
    const result=await resp.json();
    if(!result.data)throw new Error(result.error||'解析失敗');
    statusEl.innerHTML=`<div class="ai-success"><i class="ti ti-check"></i> 解析完了 — 内容を確認してフォームに反映してください</div>`;
    showOcrConfirmModal(result.data);
  }catch(err){
    statusEl.innerHTML=`<div class="ai-error"><i class="ti ti-alert-triangle"></i> 解析失敗: ${err.message}</div>`;
  }
}

function applyOcrData(btn){
  const overlay=btn.closest('.ocr-overlay');

  const gv=id=>{const el=overlay.querySelector(`#${id}`);return el?el.value:'';};
  set('homeTeam',gv('ocr-homeTeam'));set('awayTeam',gv('ocr-awayTeam'));
  set('competition',gv('ocr-competition'));set('venue',gv('ocr-venue'));
  if(gv('ocr-date'))set('date',gv('ocr-date'));
  overlay.querySelectorAll('[data-f]').forEach(el=>{
    const name=el.getAttribute('data-f');
    const target=document.querySelector(`[name="${name}"]`);
    if(target&&el.value!==undefined&&el.value!==null)target.value=el.value;
  });
  const data=overlay._ocrData;
  (data.homePlayers||[]).slice(0,20).forEach((_,i)=>{const be=document.querySelector(`[name='h_bench_${i}']`);if(be)be.value=i>=11?'true':'false';});
  (data.awayPlayers||[]).slice(0,20).forEach((_,i)=>{const be=document.querySelector(`[name='a_bench_${i}']`);if(be)be.value=i>=11?'true':'false';});
  overlay.remove();
  document.getElementById('ocr-status').innerHTML=`<div class="ai-success"><i class="ti ti-check"></i> フォームに反映しました</div>`;
}

function rSchedule(){
  const schData=DB.getObj('schedule');
  const today=new Date();
  if(!window._schState)window._schState={year:today.getFullYear(),month:today.getMonth(),clipboard:null,copyKey:null};
  const st=window._schState;
  const STAFF=[{id:'pat',name:'Pat'},{id:'nori',name:'Nori'},{id:'taku',name:'Taku'}];
  const DOW=['日','月','火','水','木','金','土'];
  const mkey=(y,m,d,sid)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}_${sid}`;
  const days=new Date(st.year,st.month+1,0).getDate();
  let rows='';
  for(let d=1;d<=days;d++){
    const dt=new Date(st.year,st.month,d);
    const dow=dt.getDay();
    const isToday=dt.getFullYear()===today.getFullYear()&&dt.getMonth()===today.getMonth()&&dt.getDate()===today.getDate();
    const dowCls=dow===0?'color:#E24B4A':dow===6?'color:#185FA5':'';
    let dateCell=`<td style="position:sticky;left:0;z-index:1;background:${isToday?'rgba(0,196,106,0.08)':'var(--bg2)'};padding:6px 8px;white-space:nowrap;border-bottom:1px solid var(--border);border-right:1px solid var(--border)">`;
    if(isToday)dateCell+=`<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;font-size:12px;font-weight:500">${d}</span>`;
    else dateCell+=`<span style="font-size:13px;font-weight:500;${dowCls}">${d}</span>`;
    dateCell+=`<div style="font-size:10px;color:var(--txt3);margin-top:1px;${dowCls}">${DOW[dow]}</div></td>`;
    let row=`<tr>${dateCell}`;
    STAFF.forEach(s=>{
      const k=mkey(st.year,st.month,d,s.id);
      const entry=schData[k];
      const isSource=k===st.copyKey;

window.schedImport=async function(){
  const st=window._schState;
  const y=st.year,m=st.month;
  const btn=document.querySelector('#content .btn.primary');
  const orig=btn?btn.innerHTML:'';
  if(btn){btn.innerHTML='<i class="ti ti-loader" style="animation:spin .7s linear infinite"></i> 読み込み中...';btn.disabled=true;}
  try{
    const res=await fetch(`/api/sheets?year=${y}&month=${m}&_=${Date.now()}`);
    if(!res.ok){const e=await res.json().catch(()=>({error:'取得失敗'}));throw new Error(e.error||'取得失敗');}
    const csv=await res.text();
    // セル内改行に対応したCSVパーサー
    const parseCSV=txt=>{
      const rows=[];let row=[],cell='',inQ=false;
      for(let i=0;i<txt.length;i++){
        const c=txt[i];
        if(inQ){
          if(c==='"'&&txt[i+1]==='"'){cell+='"';i++;}
          else if(c==='"'){inQ=false;}
          else{cell+=c;}
        }else{
          if(c==='"'){inQ=true;}
          else if(c===','){row.push(cell.trim());cell='';}
          else if(c==='\n'){row.push(cell.trim());rows.push(row);row=[];cell='';}
          else if(c!=='\r'){cell+=c;}
        }
      }
      row.push(cell.trim());if(row.some(c=>c))rows.push(row);
      return rows;
    };
    const lines=parseCSV(csv);
    // 1行目がタイトル行（"2026年6月"など）の場合スキップ、2行目がヘッダー
    const headerIdx=lines.findIndex(r=>r[0]==='スタッフ名'||r[0]==='Staff');
    if(headerIdx<0)throw new Error('ヘッダー行（スタッフ名）が見つかりません');
    const header=lines[headerIdx];
    const staffMap={Pat:'pat',Nori:'nori',Taku:'taku',pat:'pat',nori:'nori',taku:'taku'};
    const data=DB.getObj('schedule');
    let count=0;
    for(let row=headerIdx+1;row<lines.length;row++){
      const cols=lines[row];
      if(!cols||!cols[0])continue;
      const sid=staffMap[cols[0].trim()];
      if(!sid)continue;
      for(let col=1;col<header.length;col++){
        const day=parseInt(header[col].replace(/[^0-9]/g,''));
        if(!day||day<1||day>31)continue;
        const txt=(cols[col]||'').trim();
        if(!txt)continue;
        const k=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}_${sid}`;
        data[k]={text:txt,sz:'sm'};count++;
      }
    }
    DB.set('schedule',data);
    renderContent();
    alert(`✅ ${count}件のスケジュールを取り込みました`);
  }catch(e){
    alert('❌ エラー: '+e.message);
    if(btn){btn.innerHTML=orig;btn.disabled=false;}
  }
};

function _getContractPdfs(c){return c.pdfs||(c.hasPdf?[{name:c.pdfName||'contract.pdf',idx:'legacy'}]:[]);}
function _pdfKey(contractId,idx){return idx==='legacy'?'contract_pdf_'+contractId:'contract_pdf_'+contractId+'_'+idx;}
function _nextPdfIdx(pdfs){const nums=pdfs.filter(p=>p.idx!=='legacy').map(p=>Number(p.idx));for(let i=0;i<5;i++){if(!nums.includes(i))return i;}return null;}
async function _fetchPDFBlob(contractId,idx){
  const rec=await DB.fetchOne(_pdfKey(contractId,idx));
  if(!rec||!rec.data)throw new Error('not found');
  const b64=rec.data.split(',')[1];
  const bin=atob(b64);const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return{blob:new Blob([bytes],{type:'application/pdf'}),dataUrl:rec.data};
}
async function downloadContractPDF(id,name,idx){

    const url=URL.createObjectURL(blob);

    setTimeout(()=>URL.revokeObjectURL(url),10000);

async function deleteContractPDF(id,idx){
  if(!confirm('このPDFを削除しますか？'))return;
  const recs=DB.get('contracts');
  const i=recs.findIndex(r=>r.id===id);
  if(i>=0){
    const pdfs=_getContractPdfs(recs[i]);
    const remaining=pdfs.filter(p=>String(p.idx)!==String(idx));
    if(remaining.length===0){delete recs[i].pdfs;delete recs[i].hasPdf;delete recs[i].pdfName;}
    else recs[i].pdfs=remaining;

      const counter=modal.querySelector('.pdf-counter');

      if(newCount<5){
        const fileWrap=modal.querySelector('.pdf-file-input');
        if(fileWrap)fileWrap.style.display='';
      }
      DB.set(_pdfKey(id,idx),null);

  renderContent();
}

function submitForm(){
  const form=document.getElementById('modal-root').querySelector('form');
  if(!form)return;
  const data={};
  new FormData(form).forEach((v,k)=>{if(!(v instanceof File))data[k]=v;});
  form.querySelectorAll('input[type=hidden]').forEach(el=>data[el.name]=el.value);
  const fileInput=form.querySelector('input[type=file]');
  const files=fileInput?.files?Array.from(fileInput.files):[];
  if(files.length>0){
    const existingPdfs=data._id?_getContractPdfs((DB.get('contracts')||[]).find(r=>r.id===data._id)||{}):[];
    const slots=5-existingPdfs.length;
    const targets=files.slice(0,Math.max(0,slots));
    if(targets.length===0){window._ms&&window._ms(data);closeModal();return;}
    Promise.all(targets.map(f=>new Promise(resolve=>{const rd=new FileReader();rd.onload=e=>resolve({pdfData:e.target.result,pdfName:f.name});rd.readAsDataURL(f);}))).then(pdfs=>{
      pdfs.forEach(({pdfData,pdfName})=>window._ms&&window._ms({...data,pdfData,pdfName}));
      closeModal();
    });
  }else{
    window._ms&&window._ms(data);closeModal();
  }
}
function saveRecord(type,data){
  if(type==='matchreports'){saveMR(data);return;}
  if(type==='scouting'){data.positions=[data.pos0,data.pos1,data.pos2].filter(Boolean);delete data.pos0;delete data.pos1;delete data.pos2;}
  if(type==='players'){data.positions=[data.ppos0,data.ppos1,data.ppos2].filter(Boolean);data.position=data.positions[0]||'';delete data.ppos0;delete data.ppos1;delete data.ppos2;}
  const pdfData=data.pdfData;const pdfName=data.pdfName;delete data.pdfData;delete data.pdfName;
  const recs=DB.get(type);
  let id;let newPdfIdx=null;
  if(data._id){
    const i=recs.findIndex(r=>r.id===data._id);
    if(i>=0){
      if(pdfData){
        const existingPdfs=_getContractPdfs(recs[i]);
        newPdfIdx=_nextPdfIdx(existingPdfs);
        if(newPdfIdx!==null){
          if(recs[i].hasPdf&&!recs[i].pdfs){recs[i].pdfs=[{name:recs[i].pdfName||'contract.pdf',idx:'legacy'}];delete recs[i].hasPdf;delete recs[i].pdfName;}
          recs[i].pdfs=[...(recs[i].pdfs||[]),{name:pdfName,idx:newPdfIdx}];
        }
      }
      recs[i]={...recs[i],...data,id:data._id};delete recs[i]._id;id=data._id;
    }else{id=DB.id();newPdfIdx=0;recs.push({...data,id,pdfs:pdfData?[{name:pdfName,idx:0}]:[]});}
  }else{id=DB.id();newPdfIdx=0;recs.push({...data,id,pdfs:pdfData?[{name:pdfName,idx:0}]:[]});}
  DB.set(type,recs);
  if(pdfData&&newPdfIdx!==null)DB.set('contract_pdf_'+id+'_'+newPdfIdx,{name:pdfName,data:pdfData});
}
function saveMR(data){
  const hp=[],ap=[],ev=[];
  for(let i=0;i<20;i++){
    const hn=data[`h_n_${i}`];
    if(hn){
      const existH=DB.get('matchreports').find(r=>r.id===data._id);
      const prevH=(existH?.homePlayers||[]).find(p=>p.name===hn)||{};
      hp.push({num:data[`h_num_${i}`]||'',name:hn,club:data[`h_c_${i}`]||'',age:data[`h_a_${i}`]||'',position:data[`h_p_${i}`]||'',foot:data[`h_f_${i}`]||'',height:data[`h_height_${i}`]||'',weight:data[`h_weight_${i}`]||'',bench:data[`h_bench_${i}`]==='true',pitchX:prevH.pitchX,pitchY:prevH.pitchY});
      const e={name:hn,team:'home'};
      if(data[`h_memo_${i}`])e.notes=data[`h_memo_${i}`];
      if(Object.keys(e).length>2)ev.push(e);
    }
    const an=data[`a_n_${i}`];
    if(an){
      const existA=DB.get('matchreports').find(r=>r.id===data._id);
      const prevA=(existA?.awayPlayers||[]).find(p=>p.name===an)||{};
      ap.push({num:data[`a_num_${i}`]||'',name:an,club:data[`a_c_${i}`]||'',age:data[`a_a_${i}`]||'',position:data[`a_p_${i}`]||'',foot:data[`a_f_${i}`]||'',height:data[`a_height_${i}`]||'',weight:data[`a_weight_${i}`]||'',bench:data[`a_bench_${i}`]==='true',pitchX:prevA.pitchX,pitchY:prevA.pitchY});
      const e={name:an,team:'away'};
      if(data[`a_memo_${i}`])e.notes=data[`a_memo_${i}`];
      if(Object.keys(e).length>2)ev.push(e);
    }
  }
  const goals=[];
  let gi=0;
  while(data[`g_scorer_${gi}`]!==undefined||data[`g_min_${gi}`]!==undefined){
    const scorer=data[`g_scorer_${gi}`];const minute=data[`g_min_${gi}`];
    if(scorer||minute)goals.push({team:data[`g_team_${gi}`]||'home',minute:minute?Number(minute):null,scorer:scorer||'',assist:data[`g_assist_${gi}`]||''});
    gi++;
  }
  goals.sort((a,b)=>(a.minute||0)-(b.minute||0));
  const rec={homeTeam:data.homeTeam,awayTeam:data.awayTeam,homeScore:data.homeScore!==''?Number(data.homeScore):null,awayScore:data.awayScore!==''?Number(data.awayScore):null,goals,competition:data.competition,venue:data.venue,date:data.date,scoutName:data.scoutName,homeFormation:data.homeFormation,awayFormation:data.awayFormation,homePlayers:hp,awayPlayers:ap,playerEvals:ev,matchNotes:data.matchNotes};
  const recs=DB.get('matchreports');
  if(data._id){const i=recs.findIndex(r=>r.id===data._id);if(i>=0)recs[i]={...rec,id:data._id};else recs.push({...rec,id:DB.id()});}
  else recs.push({...rec,id:DB.id()});
  DB.set('matchreports',recs);
}

function previewPhoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=async()=>{
      const size=200;
      let sx,sy,sw;
      // Try FaceDetector API (Chrome)
      if(window.FaceDetector){
        try{
          const fd=new FaceDetector({fastMode:true});
          // Draw full image to temp canvas for detection
          const tmp=document.createElement('canvas');
          tmp.width=img.width;tmp.height=img.height;
          tmp.getContext('2d').drawImage(img,0,0);
          const faces=await fd.detect(tmp);
          if(faces.length>0){
            const f=faces[0].boundingBox;
            // Expand crop area around face (1.8x for head+shoulders)
            const pad=Math.max(f.width,f.height)*0.9;
            const cx=f.x+f.width/2, cy=f.y+f.height/2;
            sw=Math.max(f.width,f.height)+pad*2;
            sx=Math.max(0,cx-sw/2);
            sy=Math.max(0,cy-sw/2*0.8); // slightly above center for natural framing
            sw=Math.min(sw,img.width-sx,img.height-sy);
          }
        }catch(e){}
      }
      // Fallback: center crop
      if(sw==null){
        sw=Math.min(img.width,img.height);
        sx=(img.width-sw)/2;
        sy=(img.height-sw)/2;
      }
      const canvas=document.createElement('canvas');
      canvas.width=size;canvas.height=size;
      canvas.getContext('2d').drawImage(img,sx,sy,sw,sw,0,0,size,size);
      const data=canvas.toDataURL('image/jpeg',0.75);
      document.getElementById('photo-data-input').value=data;
      const prev=document.getElementById('photo-preview');
      prev.outerHTML=`<img src="${data}" style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--border2)" id="photo-preview">`;
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function getMatchMemos(playerName){
  if(!playerName)return[];
  const norm=s=>(s||'').replace(/\s+/g,'').toLowerCase();
  const pn=norm(playerName);

  DB.get('matchreports').forEach(mr=>{
    (mr.playerEvals||[]).forEach(e=>{

        memos.push({date:mr.date,home:mr.homeTeam,away:mr.awayTeam,notes:e.notes});
      }
    });
  });
  return memos.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}

lor:var(--txt);outline:none"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px"><div class="form-row"><label style="font-size:11px;color:var(--txt2);margin-bottom:4px;font-weight:500;display:block">身長 (cm)</label><input type="number" name="height" value="${r.height||''}" style="width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;background:var(--bg);color:var(--txt);outline:none"></div><div class="form-row"><label style="font-size:11px;color:var(--txt2);margin-bottom:4px;font-weight:500;display:block">体重 (kg)</label><input type="number" name="weight" value="${r.weight||''}" style="width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;background:var(--bg);color:var(--txt);outline:none"></div></div>${fs('scoutStatus','ステータス',[['','未設定'],['有力選手','有力選手'],['継続監視','継続監視'],['契約打診','契約打診'],['獲得推奨','獲得推奨'],['見送り','見送り']],r.scoutStatus||'')}${ft('notes','メモ',r.notes)}${ft('strengths','強み',r.strengths)}${ft('weaknesses','課題',r.weaknesses)}${memosHtml}</form>`;}

// ② プッシュ通知（シンプル版 — 起動時チェック）
function initNotifications(){
  if(!('Notification' in window))return;
  Notification.requestPermission().then(perm=>{if(perm==='granted')checkAndNotify();});
}
function checkAndNotify(){
  const today=new Date();
  const notified=JSON.parse(localStorage.getItem('ssg_notified')||'{}');
  const notify=(key,title,body)=>{
    if(notified[key])return;
    new Notification(title,{body,icon:'/icons/icon-192.png'});
    notified[key]=true;
  };
  // 弊社契約 — 90日以内
  DB.get('players').forEach(p=>{
    if(!p.contractExpiry)return;
    const d=Math.round((new Date(p.contractExpiry)-today)/86400000);
    if(d>=0&&d<=90)notify(`player-${p.id}-90`,`代理人契約期限 ${d}日前`,`${p.name}（${p.currentClub||'—'}）の契約期限が迫っています`);
  });
  // チーム契約 — 90日以内
  DB.get('contracts').forEach(c=>{
    if(!c.expiryDate)return;
    const d=Math.round((new Date(c.expiryDate)-today)/86400000);
    if(d>=0&&d<=90)notify(`contract-${c.id}-90`,`チーム契約期限 ${d}日前`,`${c.playerName||'—'}（${c.clubName||'—'}）の契約期限が迫っています`);
  });
  // リマインダー — 期日当日・超過
  DB.get('reminders').forEach(r=>{
    if(r.done||!r.dueDate)return;
    const d=Math.round((new Date(r.dueDate)-today)/86400000);
    if(d<=0)notify(`reminder-${r.id}`,`リマインダー: ${r.title}`,`${r.playerName?r.playerName+' / ':''}${d<0?Math.abs(d)+'日超過':'本日期限'}`);
  });
  // 翌日リセット
  const todayKey=today.toISOString().slice(0,10);
  if(notified._date!==todayKey){Object.keys(notified).forEach(k=>delete notified[k]);notified._date=todayKey;}
  localStorage.setItem('ssg_notified',JSON.stringify(notified));
}
